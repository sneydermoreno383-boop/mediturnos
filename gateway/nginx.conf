events {
    worker_connections 1024;
}

http {
    # Upstreams
    upstream servicio-pacientes {
        server servicio-pacientes:3001;
    }

    upstream servicio-agenda {
        server servicio-agenda:3002;
    }

    upstream servicio-resultados {
        server servicio-resultados:3003;
    }

    upstream servicio-notificaciones {
        server servicio-notificaciones:3004;
    }

    upstream servicio-auth {
        server servicio-auth:3005;
    }

    upstream servicio-facturacion {
        server servicio-facturacion:3006;
    }

    server {
        listen 80;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # Archivos de resultados
        location /uploads {
            proxy_pass http://servicio-resultados;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API endpoints
        location /api/v1/pacientes {
            proxy_pass http://servicio-pacientes;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/turnos {
            proxy_pass http://servicio-agenda;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/resultados {
            proxy_pass http://servicio-resultados;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 50M;
        }

        location /api/v1/notificaciones {
            proxy_pass http://servicio-notificaciones;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/auth {
            proxy_pass http://servicio-auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/clinicas {
            proxy_pass http://servicio-agenda;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/profesionales {
            proxy_pass http://servicio-agenda;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/facturas {
            proxy_pass http://servicio-facturacion;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Healthchecks de microservicios
        location = /api/v1/pacientes/health/live {
            proxy_pass http://servicio-pacientes;
            rewrite ^ /health/live break;
            proxy_set_header Host $host;
        }

        location = /api/v1/turnos/health/live {
            proxy_pass http://servicio-agenda;
            rewrite ^ /health/live break;
            proxy_set_header Host $host;
        }

        location = /api/v1/resultados/health/live {
            proxy_pass http://servicio-resultados;
            rewrite ^ /health/live break;
            proxy_set_header Host $host;
        }

        location = /api/v1/notificaciones/health/live {
            proxy_pass http://servicio-notificaciones;
            rewrite ^ /health/live break;
            proxy_set_header Host $host;
        }

        location = /api/v1/auth/health/live {
            proxy_pass http://servicio-auth;
            rewrite ^ /health/live break;
            proxy_set_header Host $host;
        }

        location = /api/v1/facturas/health/live {
            proxy_pass http://servicio-facturacion;
            rewrite ^ /health/live break;
            proxy_set_header Host $host;
        }

        # Healthcheck del gateway
        location /health {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin' '*' always;
            return 200 '{"estado": "activo", "servicio": "api-gateway"}';
        }
    }
}