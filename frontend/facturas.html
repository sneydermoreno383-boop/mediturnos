<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediTurnos — Facturación</title>
<script src="auth.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; color: #333; }
    header { background: #1a73e8; color: white; padding: 20px; text-align: center; }
    header h1 { font-size: 28px; }
    header p { font-size: 14px; margin-top: 5px; opacity: 0.85; }
    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
    .card { background: white; border-radius: 8px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card h2 { color: #1a73e8; margin-bottom: 20px; font-size: 18px; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
    button { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; margin-right: 8px; margin-bottom: 10px; width: auto; }
    button:hover { background: #1557b0; }
    button.verde { background: #34a853; }
    button.verde:hover { background: #2d8f47; }
    button.rojo { background: #ea4335; }
    button.rojo:hover { background: #c5221f; }
    button.pequeno { padding: 5px 12px; font-size: 12px; margin: 0; }
    .mensaje { padding: 12px; border-radius: 5px; margin-top: 15px; font-size: 14px; display: none; }
    .mensaje.exito { background: #e6f4ea; color: #2d8f47; border: 1px solid #34a853; }
    .mensaje.error { background: #fce8e6; color: #c5221f; border: 1px solid #ea4335; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 15px; overflow-x: auto; }
    table th { background: #1a73e8; color: white; padding: 10px; text-align: left; white-space: nowrap; }
    table td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
    table tr:hover { background: #f8f9fa; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
    .badge.pendiente { background: #fff3cd; color: #856404; }
    .badge.enviada { background: #cfe2ff; color: #084298; }
    .badge.rechazada { background: #f8d7da; color: #842029; }
    .badge.aceptada { background: #d1e7dd; color: #0f5132; }
    .status-bar { display: flex; gap: 10px; margin-bottom: 25px; }
    .status-item { flex: 1; background: white; border-radius: 8px; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .status-item .dot { width: 12px; height: 12px; border-radius: 50%; background: #ccc; display: inline-block; margin-right: 8px; }
    .status-item .dot.activo { background: #34a853; }
    .status-item span { font-size: 13px; font-weight: bold; }
    .nav-back { display: inline-block; margin-bottom: 20px; color: #1a73e8; font-size: 14px; text-decoration: none; }
    .nav-back:hover { text-decoration: underline; }
    .resumen { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
    .resumen-item { background: white; border-radius: 8px; padding: 18px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .resumen-item .numero { font-size: 28px; font-weight: bold; color: #1a73e8; }
    .resumen-item .etiqueta { font-size: 12px; color: #888; margin-top: 5px; }
    a.link-descarga { color: #1a73e8; text-decoration: none; font-size: 12px; }
    a.link-descarga:hover { text-decoration: underline; }
</style>
</head>
<body>
<header>
    <h1>MediTurnos — Facturación</h1>
    <p>Gestión de facturas y archivos para obras sociales</p>
</header>

<div class="container">
    <a class="nav-back" href="index.html">← Volver al sistema principal</a>

    <div class="status-bar">
        <div class="status-item"><span><span class="dot" id="dot-gateway"></span>API Gateway</span></div>
        <div class="status-item"><span><span class="dot" id="dot-facturas"></span>Facturación</span></div>
    </div>

    <!-- Resumen estadístico -->
    <div class="resumen">
        <div class="resumen-item">
            <div class="numero" id="total-facturas">-</div>
            <div class="etiqueta">Total Facturas</div>
        </div>
        <div class="resumen-item">
            <div class="numero" id="total-pendiente" style="color:#856404;">-</div>
            <div class="etiqueta">Pendientes</div>
        </div>
        <div class="resumen-item">
            <div class="numero" id="total-rechazada" style="color:#842029;">-</div>
            <div class="etiqueta">Rechazadas</div>
        </div>
        <div class="resumen-item">
            <div class="numero" id="total-monto" style="color:#34a853;">-</div>
            <div class="etiqueta">Monto Total</div>
        </div>
    </div>

    <div class="card">
        <h2>Listado de Facturas</h2>
        <button class="verde" onclick="cargarFacturas()">Actualizar Lista</button>
        <button onclick="generarFacturas()">Generar Facturas Nuevas</button>
        <div class="mensaje" id="msg-facturas"></div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Paciente</th>
                    <th>Obra Social</th>
                    <th>Valor</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Archivo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-facturas">
                <tr><td colspan="8" style="text-align:center;color:#999;">Haz clic en Actualizar lista</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Solo admin puede ver facturación
    const usuarioActual = Auth.verificar(['admin']);
    Auth.inyectarHeader('Facturación');

    const GATEWAY = 'https://movable-raging-ice.ngrok-free.dev';

    const mostrarMensaje = (texto, tipo = 'exito') => {
        const el = document.getElementById('msg-facturas');
        el.textContent = texto;
        el.className = 'mensaje ' + tipo;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    };

    const verificarServicios = async () => {
        // Verificar Gateway
        try {
            const res = await fetch(`${GATEWAY}/health`);
            if (res.ok) document.getElementById('dot-gateway').classList.add('activo');
        } catch {}

        // Verificar Facturación usando su ruta de salud
        try {
            const res = await fetch(`${GATEWAY}/api/v1/facturas/health/live`);
            if (res.ok) document.getElementById('dot-facturas').classList.add('activo');
        } catch {}
    };

    const actualizarResumen = (facturas) => {
        document.getElementById('total-facturas').textContent = facturas.length;
        document.getElementById('total-pendiente').textContent = facturas.filter(f => f.estado === 'Pendiente').length;
        document.getElementById('total-rechazada').textContent = facturas.filter(f => f.estado === 'Rechazada').length;
        const monto = facturas.reduce((acc, f) => acc + (f.valor || 0), 0);
        document.getElementById('total-monto').textContent = '$' + monto.toLocaleString('es-AR');
    };

    const cargarFacturas = async () => {
        try {
            const res = await fetch(`${GATEWAY}/api/v1/facturas`);
            const data = await res.json();
            const tbody = document.getElementById('tabla-facturas');

            if (!res.ok || !data.length) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#999;">No hay facturas registradas</td></tr>';
                actualizarResumen([]);
                return;
            }

            actualizarResumen(data);

            tbody.innerHTML = data.map(f => {
                // Mostrar nombre del paciente si existe, si no mostrar ID recortado
                const nombrePaciente = f.nombre_paciente || `ID: ${f.id_paciente.substring(0, 8)}...`;
                const fecha = new Date(f.createdAt).toLocaleDateString('es-AR');
                const estadoClass = f.estado.toLowerCase();

                const botonDescarga = f.archivo_factura
                    ? `<a class="link-descarga" href="${GATEWAY}/api/v1/facturas/${f.id_factura}/descargar" target="_blank">📄 Ver/Descargar</a>`
                    : '<span style="color:#ccc;font-size:12px;">Sin archivo</span>';

                const acciones = [];
                if (f.estado === 'Rechazada') {
                    acciones.push(`<button class="pequeno verde" onclick="refacturar('${f.id_factura}')">Re-facturar</button>`);
                }
                if (f.estado === 'Pendiente' || f.estado === 'Enviada') {
                    acciones.push(`<button class="pequeno rojo" onclick="rechazarFactura('${f.id_factura}')">Rechazar</button>`);
                }

                return `<tr>
                    <td style="font-size:11px;color:#999;">${f.id_factura.substring(0, 8)}...</td>
                    <td><strong>${nombrePaciente}</strong></td>
                    <td>${f.obra_social || 'Particular'}</td>
                    <td><strong>$${(f.valor || 0).toLocaleString('es-AR')}</strong></td>
                    <td><span class="badge ${estadoClass}">${f.estado}</span></td>
                    <td>${fecha}</td>
                    <td>${botonDescarga}</td>
                    <td>${acciones.join(' ')}</td>
                </tr>`;
            }).join('');
        } catch (e) {
            mostrarMensaje('Error al cargar facturas', 'error');
        }
    };

    const generarFacturas = async () => {
        mostrarMensaje('Generando facturas, por favor espera...', 'exito');
        try {
            const res = await fetch(`${GATEWAY}/api/v1/facturas/generar`, { method: 'POST' });
            const data = await res.json();
            if (res.ok) {
                mostrarMensaje(data.mensaje || 'Facturas generadas correctamente');
                cargarFacturas();
            } else {
                mostrarMensaje(data.mensaje || 'Error al generar facturas', 'error');
            }
        } catch (e) {
            mostrarMensaje('No se pudo conectar con el servidor', 'error');
        }
    };

    const rechazarFactura = async (id) => {
        if (!confirm('¿Marcar esta factura como rechazada?')) return;
        try {
            const res = await fetch(`${GATEWAY}/api/v1/facturas/${id}/rechazar`, { method: 'PATCH' });
            const data = await res.json();
            if (res.ok) mostrarMensaje('Factura marcada como rechazada');
            else mostrarMensaje(data.mensaje || 'Error', 'error');
            cargarFacturas();
        } catch (e) {
            mostrarMensaje('No se pudo conectar con el servidor', 'error');
        }
    };

    const refacturar = async (id) => {
        if (!confirm('¿Generar re-factura de esta factura?')) return;
        try {
            const res = await fetch(`${GATEWAY}/api/v1/facturas/${id}/refacturar`, { method: 'POST' });
            const data = await res.json();
            if (res.ok) mostrarMensaje('Factura re-facturada correctamente');
            else mostrarMensaje(data.mensaje || 'Error', 'error');
            cargarFacturas();
        } catch (e) {
            mostrarMensaje('No se pudo conectar con el servidor', 'error');
        }
    };

    verificarServicios();
    cargarFacturas();
</script>
</body>
</html>
